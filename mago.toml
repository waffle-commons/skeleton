# Configuration Mago — Skeleton Waffle Commons (Beta 0).
# Documentation complète : https://mago.carthage.software/tools/overview
php-version = "8.5.5"

[source]
paths = ["src/", "tests/"]
includes = ["vendor"]
excludes = []

# -----------------------------------------------------------------------------
# Mago Guard — périmètre architectural standardisé Beta 0.
# -----------------------------------------------------------------------------
# Le skeleton est une application de démarrage. Son code utilisateur vit sous
# `App\` et peut consommer l'ensemble de l'écosystème waffle-commons ainsi que
# la façade `Waffle\` du framework.
[guard]
mode = "default"
excludes = ["tests/bootstrap.php"]

[guard.perimeter]
layering = ["App", "AppTests"]

[guard.perimeter.layers]
core = ["@global", "Psl\\**"]
psr = ["Psr\\**"]
waffle = ["Waffle\\**", "Waffle\\Commons\\**"]

[[guard.perimeter.rules]]
namespace = "App"
permit = [
    "App\\**",
    "@layer:core",
    "@layer:psr",
    "@layer:waffle",
]

[[guard.perimeter.rules]]
namespace = "AppTests"
permit = ["@all"]

[formatter]
print-width = 120
tab-width = 4
use-tabs = false
single-quote = true
trailing-comma = true
end-of-line = "lf"

[linter]
# Politique Zéro-Baseline (Beta 0) : aucun `baseline = ...` n'est autorisé.
integrations = ["phpunit"]

[linter.rules]
# Sécurité — tolérance zéro.
no-insecure-comparison = { level = "error" }
no-literal-password = { level = "error" }
no-debug-symbols = { level = "error" }
disallowed-functions = { level = "error", functions = ["eval", "exec", "system", "shell_exec", "passthru", "phpinfo"] }

# Qualité de code — stricte.
prefer-interface = { level = "error" }
strict-types = { level = "error" }
# Métriques opinionées désactivées (alignées sur workspace) : le code d'amorçage
# (AppKernelFactory) et le parseur de tokens (EventListenerDiscovery) portent une
# complexité intrinsèque que ces métriques de volume/somme ne capturent pas utilement.
cyclomatic-complexity = { enabled = false }
too-many-methods = { enabled = false }
kan-defect = { enabled = false }
halstead = { enabled = false }
literal-named-argument = { enabled = false }
no-ini-set = { enabled = false }
# Désactivée (alignée sur workspace) : la signature `create(env, debug)` de
# `AppKernelFactory` est l'API d'amorçage canonique du kernel — `public/index.php`
# lit `APP_DEBUG` indépendamment de `APP_ENV`, donc `bool $debug` est un paramètre
# délibéré, pas un drapeau à fusionner dans une autre méthode.
no-boolean-flag-parameter = { enabled = false }

# Style — notes (informatives).
prefer-arrow-function = { level = "note" }
no-redundant-nullsafe = { level = "note" }

[analyzer]
# Politique Zéro-Baseline (Beta 0) : aucun `baseline = ...` n'est autorisé.
find-unused-definitions = true
find-unused-expressions = true
analyze-dead-code = true
strict-list-index-checks = true
strict-array-index-existence = true
ignore = [
    # Listener auto-discovery instantiates discovered #[AsEventListener] classes by
    # their scanned FQCN — a legitimate dynamic `new $fqcn()` the analyzer cannot
    # resolve to a concrete class (mirrors workspace's AppKernelFactory).
    { code = "unknown-class-instantiation", in = [
        "src/",
    ] },
    # Token-stream index access in EventListenerDiscovery: the loop is bounded by
    # count($tokens) but Mago can't prove it (mirrors workspace).
    { code = "possibly-undefined-int-array-index", in = [
        "src/",
        "tests/",
    ] },
    { code = "mixed-assignment", in = [
        "src/",
        "tests/",
    ] },
    { code = "mixed-argument", in = [
        "tests/",
    ] },
    { code = "mixed-operand", in = [
        "tests/",
    ] },
    { code = "ambiguous-object-method-access", in = [
        "tests/",
    ] },
    { code = "no-value", in = [
        "tests/",
    ] },
    { code = "invalid-method-access", in = [
        "tests/",
    ] },
    { code = "check-throws", in = [
        "tests/",
    ] },
    { code = "non-existent-class-like", in = [
        "tests/",
        "src/",
    ] },
]
