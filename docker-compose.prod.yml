services:
  php:
    # Construction à partir du stage 'prod' du Dockerfile.
    # Ce stage est minimal, sécurisé et contient le code optimisé.
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      target: prod
    image: waffle-app:prod
    # CRITIQUE : pas de volumes en production !
    # Le code est immuable et figé dans l'image.
    volumes: []
    # Variables d'environnement de production.
    environment:
      # Utiliser le vrai nom de domaine (transmis via variable d'environnement, sinon localhost).
      SERVER_NAME: ${SERVER_NAME:-localhost}
      APP_ENV: prod
      APP_DEBUG: false
      # En production réelle, les secrets doivent être injectés via la CI/CD ou Docker Secrets.
      APP_SECRET: ${APP_SECRET:-ChangeMeInProduction}
    # Exposition des ports.
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    # Politique de redémarrage en production.
    restart: always
