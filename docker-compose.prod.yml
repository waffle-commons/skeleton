services:
  php:
    # Build from the 'prod' stage of the Dockerfile
    # This stage is minimal, secure, and contains the optimized code
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      target: prod
    image: waffle-app:prod
    # CRITICAL: No volumes in production!
    # The code is immutable and baked into the image.
    volumes: []
    # Environment variables for Production
    environment:
      # Use the real domain name (passed via env var or default to localhost)
      SERVER_NAME: ${SERVER_NAME:-localhost}
      APP_ENV: prod
      APP_DEBUG: false
      # Secrets should be injected via CI/CD or Docker Secrets in a real environment
      APP_SECRET: ${APP_SECRET:-ChangeMeInProduction}
    # Expose ports
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    # Production restart policy
    restart: always
