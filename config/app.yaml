# Main application configuration for the Waffle Framework
waffle:
  # App environment (dev, prod, test). Set via server environment variable.
  env: '%env(APP_ENV)%'
  # Debug mode. Set to false in production for security.
  debug: '%env(APP_DEBUG)%'
  # Security Hardening: Trusted Hosts
  # List of allowed domains. If empty, all hosts are allowed (DEV only).
  # In PROD, this MUST be configured to prevent Host Header Injection.
  trusted_hosts:
    - localhost
  security:
    level: 10
  paths:
    controllers: 'src/Controller'
    services: 'src/Service'

