# Configuration principale de l'application Waffle.
waffle:
  # Environnement applicatif (dev, prod, test). Renseigné par la variable d'environnement serveur.
  env: '%env(APP_ENV)%'
  # Mode debug. À mettre à false en production pour des raisons de sécurité.
  debug: '%env(APP_DEBUG)%'
  # Durcissement sécurité : hôtes de confiance.
  # Liste des domaines autorisés. Si vide, tous les hôtes sont acceptés (DEV uniquement).
  # En PROD, ce paramètre DOIT être renseigné pour prévenir l'injection d'en-tête Host.
  trusted_hosts:
    - localhost
  security:
    level: 10
    csrf:
      # Secret de signature de 32 octets ou plus pour les jetons CSRF HMAC sans état (Beta-1 / SEC-01).
      # Résolu depuis l'env WAFFLE_CSRF_SECRET. En prod, un secret absent ou trop
      # court avorte le boot — renseignez-le dans votre manifeste de déploiement
      # avant la mise en ligne.
      secret: '%env(WAFFLE_CSRF_SECRET)%'
    # CORS fail-closed (SEC-04) : liste blanche d'origines exactes
    # (scheme://host[:port]). Vide par défaut ⇒ toute requête cross-origin est
    # refusée. Ajoutez vos origines front-end pour l'ouvrir ; jamais « * » avec
    # des cookies/identifiants (rejeté à la construction de CorsPolicy).
    cors:
      allowed_origins: []
  # Pont d'Authentification Universel (RFC-021, paquet waffle-commons/auth).
  auth:
    # Secret partagé du pont (HMAC-SHA256) : signe les assertions d'identité
    # X-Wfl-Assert-User et valide les JWT HS256 de la démo. 32 octets minimum —
    # absent ou trop court ⇒ avortement du boot en production (principe
    # fail-closed, RFC-021 §4.2). NE COMMITTEZ JAMAIS la valeur : renseignez-la
    # dans votre .env local ou votre manifeste de déploiement.
    secret: '%env(WAFFLE_AUTH_SECRET)%'
    # Identifiant de tenant estampillé dans chaque assertion sortante (`ten`).
    tenant: 'skeleton'
    jwt:
      # Émetteur et audience attendus des jetons Bearer de la démo (HS256).
      issuer: 'https://waffle-dev.local'
      audience: 'waffle-skeleton'
    # Hôtes autorisés à recevoir l'assertion sortante X-Wfl-Assert-User via le
    # client HTTP décoré (RFC-021 §4.7). Vide ⇒ aucune propagation sortante.
    assert_hosts: []
  paths:
    controllers: 'src/Controller'
    services: 'src/Service'
    event_listeners: 'app/EventListener'
  # Configuration de la journalisation (PSR-3).
  log:
    channel: app
    stream: 'php://stderr'
  # Cache PSR-16 (RFC-013). Alimente le cache du Router et le futur store CSRF.
  cache:
    adapter: 'redis'                    # array | file | redis
    directory: 'var/cache/psr16'       # résolu par rapport à APP_ROOT (adaptateur file)
    redis_dsn: '%env(REDIS_DSN)%'      # adaptateur redis uniquement
    default_ttl: 3600                  # en secondes, optionnel
    prefix: 'waffle:cache:'            # adaptateur redis uniquement, optionnel
  # Configuration de la base de données locale (RFC-022).
  # Les identifiants sont résolus depuis l'environnement (.env / Docker / K8s).
  # `migrations_path` est relatif à la racine du projet : lancez `bin/waffle
  # db:migrate` depuis cette racine pour que les scripts SQL soient découverts.
  database:
    driver: 'mysql'
    host: '%env(DB_HOST)%'
    port: '%env(DB_PORT)%'
    database: '%env(DB_NAME)%'
    username: '%env(DB_USER)%'
    password: '%env(DB_PASSWORD)%'
    charset: 'utf8mb4'
    migrations_path: 'migrations'

