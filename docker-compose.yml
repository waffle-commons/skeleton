services:
  php:
    # Construction à partir du stage 'dev' du Dockerfile.
    # Ce stage inclut Composer, Xdebug et un utilisateur non-root.
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      target: dev
    image: waffle-app:dev
    # En développement, le dossier local est monté sur /app.
    # Cela permet le « hot reload » et de coder sans rebuild.
    volumes:
      - ./:/app
    # Variables d'environnement de développement.
    environment:
      SERVER_NAME: localhost
      APP_ENV: dev
      APP_DEBUG: true
      # Activation du débogage pas-à-pas et de la couverture Xdebug.
      XDEBUG_MODE: debug,coverage
    # Exposition HTTP (80), HTTPS (443) et HTTP/3 (443 UDP).
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    # Conservation interactive du conteneur.
    tty: true
